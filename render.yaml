services:
  - type: web
    name: mediscan-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMAIL_ADDRESS
        value: your-email@gmail.com
      - key: EMAIL_PASSWORD
        value: your-app-password
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587

databases:
  - name: mediscan-db
    databaseName: mediscan
    user: mediscan_user
